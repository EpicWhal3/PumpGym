services:
  db:
    image: postgres:15-alpine
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d gym_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
  
  api:
    build: .
    container_name: gym_api
    restart: always
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db

volumes:
  pgdata: