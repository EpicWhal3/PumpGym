services:
  db:
    image: postgres:15-alpine
    container_name: gym_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gym_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  api:
    build: .
    container_name: gym_api
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: gym_db
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - db
    command: npm run start:prod

volumes:
  pgdata: